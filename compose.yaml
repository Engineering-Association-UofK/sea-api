services:
  server:
    image: radgit/sea-api-server:latest
    env_file:
      - .env.compose
    ports:
      - 8000:8000
    volumes:
      - ./.keys/sea_key.p12:/app/keys/sea_key.p12:ro
      - ./resources:/app/resources
      - ./db/migrations:/app/db/migrations
    deploy:
      resources:
        limits:
          memory: 200M
    shm_size: 128mb

    depends_on:
      db:
        condition: service_healthy
      master:
        condition: service_started

  master:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 9333:9333
      - 19333:19333
      - 9324:9324
    command: 'master -ip=master -ip.bind=0.0.0.0 -metricsPort=9324'

  volume:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 8080:8080
      - 18080:18080
      - 9325:9325
    command: 'volume -ip=volume -master="master:9333" -ip.bind=0.0.0.0 -port=8080 -metricsPort=9325'
    volumes:
      - seaweed-data:/data
    depends_on:
      - master
    deploy:
      resources:
        limits:
          memory: 100M

  filer:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 8888:8888
      - 18888:18888
      - 9326:9326
    command: 'filer -ip=filer -master="master:9333" -ip.bind=0.0.0.0 -metricsPort=9326'
    tty: true
    stdin_open: true
    depends_on:
      - master
      - volume

  db:
    image: mysql:8.4
    restart: always
    env_file:
      - .env.compose
    volumes:
      - mysql-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 250M
    ports:
      - 8008:3306
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # s3:
  #   image: chrislusf/seaweedfs:4.15
  #   ports:
  #     - 8333:8333
  #     - 9327:9327
  #   command: 's3 -filer="filer:8888" -ip.bind=0.0.0.0 -metricsPort=9327'
  #   depends_on:
  #     - master
  #     - volume
  #     - filer

  webdav:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 7333:7333
    command: 'webdav -filer="filer:8888"'
    depends_on:
      - master
      - volume
      - filer

  # prometheus:
  #   image: prom/prometheus:v2.21.0
  #   ports:
  #     - 9000:9090
  #   volumes:
  #     - ./prometheus:/etc/prometheus
  #   command: '--web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yml'
  #   depends_on:
  #     - s3

volumes:
  seaweed-data:
  mysql-data:

