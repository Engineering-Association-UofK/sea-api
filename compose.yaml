services:
  server:
    image: techseauofk/sea-api-server:latest
    env_file:
      - .env.compose
    ports:
      - 8000:8000
    volumes:
      - ./.keys/sea_key.p12:/app/keys/sea_key.p12:ro
      - ./resources:/app/resources
    deploy:
      resources:
        limits:
          memory: 200M
    shm_size: 128mb

    depends_on:
      db:
        condition: service_healthy
      master:
        condition: service_started

  master:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 9333:9333
      - 19333:19333
      - 9324:9324
    command: 'master -ip=master -ip.bind=0.0.0.0 -metricsPort=9324'

  volume:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 8080:8080
      - 18080:18080
      - 9325:9325
    command: 'volume -ip=volume -master="master:9333" -ip.bind=0.0.0.0 -port=8080 -metricsPort=9325 -dir=/data'
    volumes:
      - ~/.docker/container/sea-api/seaweed-volume:/data
    depends_on:
      - master
    deploy:
      resources:
        limits:
          memory: 100M

  filer:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 8888:8888
      - 18888:18888
      - 9326:9326
    command: 'filer -ip=filer -master="master:9333" -ip.bind=0.0.0.0 -metricsPort=9326 -defaultStoreDir=/data'
    volumes:
      - ~/.docker/container/sea-api/filer-metadata:/data
    tty: true
    stdin_open: true
    depends_on:
      - master
      - volume

  db:
    image: mysql:8.4
    restart: always
    env_file:
      - .env.compose
    volumes:
      - ~/.docker/container/sea-api/mysql:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 350M
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  s3:
    image: chrislusf/seaweedfs:4.15
    ports:
      - 8333:8333
      - 9327:9327
    volumes:
      - ./resources/config.json:/etc/seaweedfs/config.json:ro
    command: 's3 -filer="filer:8888" -ip.bind=0.0.0.0 -metricsPort=9327 -config=/etc/seaweedfs/config.json'
    depends_on:
      - master
      - volume
      - filer

